<div id="dm-section-ml" style="margin-top: 50px; font-family: 'Inter', system-ui, sans-serif;">
    
    <h2 style="border-bottom: 2px solid #28a745; padding-bottom: 10px; color: #2d3436; font-size: 1.5rem; margin-bottom: 25px; font-weight: 500;">
        🧠 Section 2: Smart Lexicon
    </h2>

    <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 0.8rem; color: #636e72; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Current Mode:</span>
        <div class="lex-capsule" style="background: #007bff; color: white; border: none; min-width: auto; padding: 5px 15px; height: auto; min-height: 28px;">
            <span class="lex-label" style="color: white; font-size: 0.75rem;">Means like</span>
            <div class="lex-q" style="background: rgba(255,255,255,0.2); top: 0; right: 0; position: relative; margin-left: 8px; width: 14px; height: 14px; font-size: 9px;">?
                <div class="lex-tooltip">
                    <strong>MEANS LIKE (ML)</strong><br>
                    Finds words with a similar meaning.
                </div>
            </div>
        </div>
    </div>

    <div style="display: flex; gap: 0; margin-bottom: 30px; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <input type="text" id="dm-ml-input" placeholder="Enter a concept (e.g., 'joy' or 'ringing in ears')..." 
               style="flex: 1; padding: 14px 18px; border: none; font-size: 1rem; outline: none;">
        <button onclick="fetchMeansLike()" 
                style="padding: 0 30px; background: #28a745; color: white; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">
            Explore
        </button>
    </div>

    <div id="dm-ml-results" style="display: flex; flex-wrap: wrap; gap: 12px;">
        </div>
</div>

<style>
    /* 基础灰色方块样式 */
    .lex-capsule {
        position: relative;
        background: #dcdcdc; /* 浅灰色背景 */
        color: #333;
        padding: 10px 25px;
        font-size: 0.85rem;
        font-weight: 500;
        border-radius: 2px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 120px;
        cursor: default;
    }

    /* 右上角问号 */
    .lex-q {
        position: absolute;
        top: -2px;
        right: -2px;
        width: 16px;
        height: 16px;
        background: #999;
        color: white;
        font-size: 10px;
        font-weight: bold;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: help;
    }

    /* 悬停提示框：淡灰色背景，黑色瘦体字 */
    .lex-tooltip {
        visibility: hidden;
        opacity: 0;
        position: absolute;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        background: #f5f7f9; /* 淡灰色背景 */
        color: #2d3436;      /* 黑色字 */
        padding: 15px;
        border-radius: 6px;
        width: 280px;
        font-size: 11px;
        font-weight: 300;    /* 瘦体字 */
        line-height: 1.6;
        z-index: 1000;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border: 1px solid #d1d9e0;
        transition: opacity 0.2s;
        pointer-events: none;
    }

    .lex-q:hover .lex-tooltip {
        visibility: visible;
        opacity: 1;
    }

    /* 提示框内加粗变深蓝 */
    .lex-tooltip strong {
        color: #004085;
        font-weight: 700;
        display: block;
        margin-bottom: 5px;
    }
</style>

<script>
    async function fetchMeansLike() {
        const query = document.getElementById('dm-ml-input').value.trim();
        const container = document.getElementById('dm-ml-results');
        
        if (!query) return;
        container.innerHTML = '<p style="font-size:0.8rem; color:#999;">Searching...</p>';

        try {
            const response = await fetch(`https://api.datamuse.com/words?ml=${encodeURIComponent(query)}&md=dps&max=18`);
            const data = await response.json();

            container.innerHTML = ''; 

            data.forEach(item => {
                const pos = item.tags ? `<i>(${item.tags[0]})</i>` : '';
                const def = item.defs ? item.defs[0].split('\t')[1] : 'No definition.';
                const score = item.score ? `Score: ${item.score}` : '';

                const capsule = document.createElement('div');
                capsule.className = 'lex-capsule';
                capsule.innerHTML = `
                    <span class="lex-label">${item.word}</span>
                    <div class="lex-q">?
                        <div class="lex-tooltip">
                            <strong>${item.word.toUpperCase()}</strong>
                            ${pos}<br>
                            <span style="display:block; margin: 8px 0;">${def}</span>
                            <code style="color:#0056b3; font-weight:700;">${score}</code>
                        </div>
                    </div>
                `;
                container.appendChild(capsule);
            });
        } catch (error) {
            container.innerHTML = '<p style="color:red;">API Error.</p>';
        }
    }
</script>
