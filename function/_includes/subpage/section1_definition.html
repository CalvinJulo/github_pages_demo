
---
layout: default
title: Lexicon Dashboard
---

<div id="dictionary-dashboard" style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 1000px; margin: 0 auto;">

    <div style="background: #2c3e50; padding: 30px; border-radius: 8px; margin-bottom: 20px; color: white;">
        <h1 style="margin: 0 0 15px 0; font-size: 1.5rem; letter-spacing: 1px;">LEXICON DASHBOARD</h1>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="global-search-input" placeholder="Type a word to analyze..." 
                   style="flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 1.1rem;">
            <button onclick="updateDashboard()" 
                    style="padding: 10px 25px; background: #34495e; color: white; border: 1px solid #7f8c8d; border-radius: 4px; cursor: pointer; font-weight: bold;">
                ANALYZE
            </button>
        </div>
    </div>

    <div id="metadata-strip" style="display: none; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px;">
        <div style="background: #ecf0f1; padding: 15px; border-radius: 6px; border-left: 4px solid #27ae60;">
            <small style="color: #7f8c8d; display: block; text-transform: uppercase; font-size: 0.7rem;">Pronunciation</small>
            <span id="meta-ipa" style="font-size: 1.1rem; font-weight: bold; color: #2c3e50;">-</span>
        </div>
        <div style="background: #ecf0f1; padding: 15px; border-radius: 6px; border-left: 4px solid #2980b9;">
            <small style="color: #7f8c8d; display: block; text-transform: uppercase; font-size: 0.7rem;">Frequency</small>
            <span id="meta-freq" style="font-size: 1.1rem; font-weight: bold; color: #2c3e50;">-</span>
        </div>
        <div style="background: #ecf0f1; padding: 15px; border-radius: 6px; border-left: 4px solid #8e44ad;">
            <small style="color: #7f8c8d; display: block; text-transform: uppercase; font-size: 0.7rem;">Primary POS</small>
            <span id="meta-pos" style="font-size: 1.1rem; font-weight: bold; color: #2c3e50;">-</span>
        </div>
    </div>

    <div id="onelook-viewport" style="position: relative; width: 100%; height: 700px; border: 1px solid #dcdde1; border-radius: 8px; background: #fff; overflow: hidden;">
        <div id="loader" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <div class="spinner"></div>
        </div>
        <iframe id="main-frame" src="about:blank" style="width: 100%; height: 100%; border: none;" onload="stopLoader()"></iframe>
    </div>

</div>

<style>
    .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #2c3e50;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<script>
    async function updateDashboard() {
        const word = document.getElementById('global-search-input').value.trim();
        if (!word) return;

        // Start Loader
        document.getElementById('loader').style.display = 'block';

        // 1. Update OneLook Section
        document.getElementById('main-frame').src = `https://www.onelook.com/?w=${encodeURIComponent(word)}`;

        // 2. Fetch Datamuse Metadata
        try {
            const response = await fetch(`https://api.datamuse.com/words?sp=${word}&md=prf&ipa=1&qe=sp&max=1`);
            const data = await response.json();
            
            if (data && data.length > 0) {
                const entry = data[0];
                const tags = entry.tags || [];
                
                // Show metadata strip
                document.getElementById('metadata-strip').style.display = 'grid';

                // Extract IPA
                const ipaTag = tags.find(t => t.startsWith('pron:'));
                document.getElementById('meta-ipa').innerText = ipaTag ? `/${ipaTag.split(':')[1]}/` : 'N/A';

                // Extract Frequency (rounded to 2 decimal places)
                const freqTag = tags.find(t => t.startsWith('f:'));
                document.getElementById('meta-freq').innerText = freqTag ? freqTag.split(':')[1] + ' per mil' : 'N/A';

                // Extract POS (first tag is usually primary)
                const posList = tags.filter(t => ['n', 'v', 'adj', 'adv'].includes(t));
                document.getElementById('meta-pos').innerText = posList.length > 0 ? posList[0].toUpperCase() : 'Unknown';
            }
        } catch (error) {
            console.error("Datamuse API error:", error);
        }
    }

    function stopLoader() {
        document.getElementById('loader').style.display = 'none';
    }

    document.getElementById('global-search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') updateDashboard();
    });
</script>
