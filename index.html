<html>
  <head>
    <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script defer src="https://pyscript.net/latest/pyscript.js"></script>
  </head>
  <body>
    <h1>英语听写练习（Python 版）</h1>
    <input type="text" id="user_input" placeholder="输入单词">
    <button id="check_btn" py-click="check_word()">检查</button>
    <div id="output"></div>

    <py-script>
      # 没错，这里写的是纯正的 Python 代码！
      def check_word():
          target = "ambitious"
          # 获取网页输入框的值
          user_val = Element("user_input").element.value
          
          output = Element("output")
          if user_val.lower() == target:
              output.write("✅ 聪明！Python 觉得你写对了")
          else:
              output.write("❌ 不对哦，再想想")
    </py-script>
  </body>
</html>
