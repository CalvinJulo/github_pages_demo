<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lexicon Spark v8 - Immersive Loop</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --main: #121212; --accent: #007bff; --border: #eee; }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #fff; overflow: hidden; }
        
        /* 1. Top control bar */
        .nav-mini { padding: 8px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fdfdfd; }
        .settings { display: flex; gap: 15px; align-items: center; }
        .switch { font-size: 10px; color: #999; display: flex; align-items: center; gap: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .source-select { font-size: 10px; color: #666; border: 1px solid #ddd; border-radius: 4px; padding: 2px 6px; text-transform: uppercase; font-weight: 700; background: #fff; cursor: pointer; outline: none; }

        /* 2. Word card zone (compact) */
        .card-zone { height: 45%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; background: #fff; }
        .word-text { font-size: 3.8rem; font-weight: 900; letter-spacing: -2px; margin: 0; color: var(--main); cursor: pointer; }
        .phonetic { font-family: 'Source Code Pro', monospace; color: var(--accent); margin: 5px 0 10px 0; font-size: 1.1rem; }
        
        .def-box { max-width: 800px; text-align: center; margin-bottom: 10px; color: #333; font-size: 1.05rem; line-height: 1.4; }
        .ex-box { max-width: 700px; color: #666; font-size: 0.9rem; text-align: center; font-style: italic; border-top: 1px solid #f9f9f9; padding-top: 10px; min-height: 2.4em; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 15px; }
        .btn-circle { background: #fff; border: 1px solid #ddd; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-circle:hover { border-color: var(--main); background: #fafafa; }
        .btn-circle .material-icons { font-size: 20px; color: var(--main); }

        #loopStatus { font-size: 9px; color: var(--accent); font-weight: 800; margin-top: 10px; visibility: hidden; }
        .looping #loopStatus { visibility: visible; }

        /* 3. OneLook preview zone */
        .preview-zone { flex: 1; border-top: 2px solid var(--main); background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-next { background: var(--main); color: #fff; border: none; padding: 8px 18px; cursor: pointer; font-size: 11px; font-weight: 700; border-radius: 4px; }
    </style>
</head>
<body id="mainStage" tabindex="0">

<nav class="nav-mini">
    <div class="settings">
        <select id="wordSource" class="source-select">
            <option value="oxford" selected>Oxford 5000</option>
            <option value="ielts">IELTS</option>
            <option value="toefl">TOEFL</option>
            <option value="heroku">Heroku Random</option>
        </select>
        <label class="switch"><input type="checkbox" id="autoVoice" checked> Sound</label>
        <label class="switch"><input type="checkbox" id="spaceNext" checked> Space</label>
        <label class="switch" style="color: var(--accent);"><input type="checkbox" id="autoLoop"> Auto Loop</label>
    </div>
    <button class="btn-next" onclick="generateNext()">NEXT (SPACE)</button>
</nav>

<main class="card-zone" id="cardZone">
    <h1 id="word" class="word-text" onclick="playWord()">...</h1>
    <div id="phonetic" class="phonetic">/ -- /</div>
    
    <div class="def-box" id="definition">Fetch definitions...</div>
    <div class="ex-box" id="example">Context example will appear here.</div>

    <div class="btn-group">
        <button class="btn-circle" onclick="playWord()" title="Word"><span class="material-icons">volume_up</span></button>
        <button class="btn-circle" onclick="playSentence()" title="Example"><span class="material-icons">hearing</span></button>
    </div>

    <div id="loopStatus">● AUTO LOOPING (2X READ)</div>
</main>

<section class="preview-zone">
    <iframe id="olFrame" sandbox="allow-scripts allow-forms allow-same-origin" src="about:blank"></iframe>
</section>

<script>
    let currentWord = "";
    let wordAudio = null;
    let isLooping = false;

    const wordLists = { ielts: null, toefl: null, oxford: null };
    const sourceUrls = {
        ielts: 'https://raw.githubusercontent.com/lzrk/nglsh/master/IELTS-4000.txt',
        toefl: 'https://raw.githubusercontent.com/mahavivo/english-wordlists/master/TOEFL.txt',
        oxford: 'https://raw.githubusercontent.com/jnoodle/English-Vocabulary-Word-List/master/Oxford%205000.txt'
    };

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && document.getElementById('spaceNext').checked) {
            e.preventDefault();
            generateNext();
        }
    });

    document.getElementById('autoLoop').addEventListener('change', (e) => {
        isLooping = e.target.checked;
        document.getElementById('cardZone').classList.toggle('looping', isLooping);
        if (isLooping) startLoopEngine();
    });

    async function generateNext() {
        document.getElementById('word').innerText = "Updating...";
        try {
            const source = document.getElementById('wordSource').value;
            if (source === 'heroku') {
                const res = await fetch('https://random-word-api.herokuapp.com/word');
                const data = await res.json();
                currentWord = data[0];
            } else if (['ielts', 'toefl', 'oxford'].includes(source)) {
                if (!wordLists[source]) {
                    document.getElementById('word').innerText = "Loading list...";
                    const res = await fetch(sourceUrls[source]);
                    const text = await res.text();
                    wordLists[source] = text.split('\n').map(w => w.trim()).filter(w => w.length > 0);
                }
                const list = wordLists[source];
                let rawWord = list[Math.floor(Math.random() * list.length)];
                currentWord = rawWord.split(/\s+/)[0].replace(/[^a-zA-Z\-]/g, '');
                if (!currentWord) currentWord = "lexicon";
            }

            document.getElementById('word').innerText = currentWord;
            document.getElementById('olFrame').src = `https://www.onelook.com/?w=${currentWord}`;
            
            await fetchFullData(currentWord);
        } catch (e) { console.log("Load failed", e); }
    }

    async function fetchFullData(word) {
        wordAudio = null;
        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            const data = await res.json();
            if (data && data[0]) {
                const entry = data[0];
                document.getElementById('phonetic').innerText = entry.phonetic || "/ -- /";
                
                // Definition
                document.getElementById('definition').innerText = entry.meanings[0].definitions[0].definition;
                
                // Example
                let example = "";
                entry.meanings.forEach(m => {
                    if (!example) {
                        const d = m.definitions.find(def => def.example);
                        if (d) example = d.example;
                    }
                });
                document.getElementById('example').innerText = example ? `"${example}"` : "Search OneLook below for context.";

                // Audio
                const audio = entry.phonetics.find(p => p.audio !== "");
                if (audio) wordAudio = new Audio(audio.audio);

                if (document.getElementById('autoVoice').checked && !isLooping) {
                    setTimeout(playWord, 300);
                }
            }
        } catch (e) {
            document.getElementById('definition').innerText = "OneLook results loaded below.";
            document.getElementById('example').innerText = "";
        }
    }

    function playWord(callback) {
        if (wordAudio) {
            wordAudio.onended = callback;
            wordAudio.play().catch(() => speakNative(currentWord, callback));
        } else {
            speakNative(currentWord, callback);
        }
    }

    function playSentence() {
        speakNative(document.getElementById('example').innerText);
    }

    function speakNative(text, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.85;
        if (callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    // Automated loop engine
    async function startLoopEngine() {
        if (!isLooping) return;
        
        await generateNext();
        
        // First time reading the word
        playWord(() => {
            if (!isLooping) return;
            // Pause for 1 second
            setTimeout(() => {
                if (!isLooping) return;
                // Second time reading the word
                playWord(() => {
                    // After reading the second time, pause for 1.5 seconds then jump to the next
                    setTimeout(() => {
                        if (isLooping) startLoopEngine();
                    }, 1500);
                });
            }, 1000);
        });
    }

    window.onload = () => {
        generateNext();
    };
</script>

</body>
</html>
